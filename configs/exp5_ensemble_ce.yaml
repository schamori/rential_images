# Experiment 5 — Ensemble with plain CE loss (no class weights, no resampling)
# Tests whether ensemble variance reduction alone helps without loss modifications
loss: "ce"
use_class_weights: false
sampler: "default"
ensemble: true

# For ensemble size 5 use:
ensemble_n: 5
ensemble_seeds: [42, 7, 123, 363, 789]

# For ensemble size 10 use:
# ensemble_n: 10
# ensemble_seeds: [42, 7, 32, 84, 104, 123, 363, 456, 627, 789]
