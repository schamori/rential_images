# Experiment 4 — Ensemble + weighted CE loss
# Train N models with different seeds using weighted CE loss,
# then average logits at inference for the final prediction
loss: "weighted_ce"
use_class_weights: true
sampler: "default"
ensemble: true

# For ensemble size 5 use:
ensemble_n: 5
ensemble_seeds: [42, 7, 123, 363, 789]

# For ensemble size 10 use:
# ensemble_n: 10
# ensemble_seeds: [42, 7, 32, 84, 104, 123, 363, 456, 627, 789]
